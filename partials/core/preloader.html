<!-- preloader.html -->
<div class="preloader">
  <div class="space">
    <div class="splash-container">
      <h1 class="preloader-heading">Mystic-Devloper</h1>
      <p class="splash-text" id="splash-text">Loading splash...</p>
    </div>

    <div class="planet-shadow"></div>

    <div class="planet-wrapper">
      <div class="ring back"></div>
      <div class="planet">
        <div class="crater c1"></div>
        <div class="crater c2"></div>
        <div class="crater c3"></div>
        <div class="crater c4"></div>
      </div>
      <div class="ring front"></div>
    </div>

    <div class="loading-text">Now Loading<span class="dots">.</span></div>
  </div>
</div>

<style>
  .preloader {
    position: fixed;
    inset: 0;
    background-color: #EAF3EA;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .space {
    position: relative;
    width: 220px;
    height: 360px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .splash-container {
    margin-bottom: 12px;
  }

  .preloader-heading {
    font-size: 20px;
    font-weight: bold;
    color: #2F4F4F; /* Deep Forest */
    margin: 0 0 6px 0;
  }

  .splash-text {
    color: #555555; /* Stone Gray */
    font-size: 14px;
    white-space: pre-line;
    margin: 0 0 8px 0;
    animation: pulse 2.4s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      opacity: 1;
    }
    50% {
      transform: scale(1.08);
      opacity: 0.95;
    }
  }

  .planet-shadow {
    position: absolute;
    width: 80px;
    height: 10px;
    background-color: rgba(0, 0, 0, 0.25);
    border-radius: 50%;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    animation: shadow-scale 2.5s ease-in-out infinite;
    z-index: 0;
  }

  .planet-wrapper {
    animation: bounce 2.5s ease-in-out infinite;
    position: relative;
    width: 200px;
    height: 200px;
    z-index: 2;
  }

  .planet {
    width: 100px;
    height: 100px;
    background-color: #3C6E71; /* Teal Blue */
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: inset -8px -8px 0 rgba(0, 0, 0, 0.15);
  }

  .crater {
    position: absolute;
    background: #2e4f52;
    border-radius: 50%;
    opacity: 0.6;
    box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2);
  }

  .c1 { width: 16px; height: 16px; top: 20px; left: 20px; }
  .c2 { width: 12px; height: 12px; top: 60px; left: 40px; }
  .c3 { width: 10px; height: 10px; top: 45px; right: 25px; }
  .c4 { width: 8px; height: 8px; bottom: 20px; left: 30px; }

  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 160px;
    height: 60px;
    border: 2px solid #555555; /* Stone Gray */
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(70deg) rotateZ(-20deg);
  }

  .ring.front { z-index: 4; border-top: none; }
  .ring.back { z-index: 1; border-bottom: none; }

  .loading-text {
    margin-top: 12px;
    font-size: 16px;
    font-family: monospace;
    color: #2E2E2E; /* Charcoal Gray */
  }

  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-15px); }
  }

  @keyframes shadow-scale {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.25; }
    50%      { transform: translateX(-50%) scale(0.7); opacity: 0.15; }
  }
</style>

<script>
  const splashTexts = [
    "Mystic-Devloper is kinda cool, right?",
    "C++ was created by Bjarne Stroustrup and,\nits development began in 1979.",
    "Python was created by Guido van Rossum and,\nit was first released on 1991.",
    "Coding is tiring!",
    "Mathematics is beautiful.",
    "(a+b)² = a² + 2ab + b².",
    "Are you a coder?",
    "Aha, fellow Maths & CS lover!",
    "Maths and Computer Science are the best!!",
    "Follow me on my socials!",
    "Did you read Games and Numbers?\nIts is so much fun!",
    "print(\"Hello, World!\")",
    "std::cout << (\"Why C++ is so hard?\");",
    "It is never about the destination,\nAll that matters is journey.",
    "(a + b)(a - b) = a² - b²"
  ];

  document.addEventListener("DOMContentLoaded", () => {
    const splashTextElement = document.getElementById("splash-text");
    const randomText = splashTexts[Math.floor(Math.random() * splashTexts.length)];
    splashTextElement.textContent = randomText;
  });
</script>
